<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>捲動放映 · 圖片序列引擎｜角落旅行社</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0b0d0c}
::-webkit-scrollbar-thumb{background:#3a2f22;border-radius:3px}
body{background:#0b0d0c;overflow-x:hidden}

.scroller{position:relative;height:380vh}
.viewport{position:fixed;inset:0;overflow:hidden;background:#0b0d0c}
.bg{position:absolute;top:-3%;left:-3%;width:106%;height:106%;transform:translate3d(0,0,0);transition:transform .5s cubic-bezier(.15,.85,.35,1)}
.bg canvas{width:100%;height:100%;display:block}
.prog{position:fixed;top:0;left:0;height:2px;width:100%;z-index:40;transform-origin:left;transform:scaleX(0);background:linear-gradient(90deg,#B07A4E,#E6C79C)}

.loading{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0b0d0c;transition:opacity .9s ease}
.loading.hidden{opacity:0;pointer-events:none}
.ring{width:46px;height:46px;border-radius:50%;border:1px solid rgba(230,199,156,.25);border-top-color:#E6C79C;animation:spin 1.1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltx{font-family:"Cormorant Garamond",Georgia,serif;letter-spacing:.3em;text-transform:uppercase;font-size:11px;color:rgba(230,199,156,.8)}
</style>
</head>
<body>
<div class="scroller" id="scroller">
  <div class="viewport">
    <div class="bg" id="bg"><canvas id="cv"></canvas></div>
    <div class="prog" id="prog"></div>
    <div class="loading" id="loading"><div class="ring"></div></div>
  </div>
</div>

<script>
(function(){
  /* ============ image-sequence scrub engine — no video decoder, no flicker ============ */
  var SEGS=[
    {dir:'film/frames/s1b', count:121},
    {dir:'film/frames/s4', count:121},
    
  ];
  var frames=[]; // flat, in play order
  SEGS.forEach(function(s){
    for(var k=1;k<=s.count;k++){
      frames.push(s.dir+'/f_'+String(k).padStart(3,'0')+'.webp');
    }
  });
  var TOTAL=frames.length;

  var cv=document.getElementById('cv'), bg=document.getElementById('bg');
  var prog=document.getElementById('prog'), loading=document.getElementById('loading');
  var ltx=document.getElementById('ltx'), scroller=document.getElementById('scroller');
  var imgs=new Array(TOTAL), ok=new Array(TOTAL);
  var target=0, cur=0, lastDrawn=-1;

  /* 梯度載入：頁面即開即玩 — 先鋪稀疏幀(1/8)，再逐層補密，畫面隨載入自動變順 */
  var order=[];[[8,0],[8,4],[4,2],[2,1]].forEach(function(sp){for(var k=sp[1];k<TOTAL;k+=sp[0])order.push(k);});
  var qi=0, revealed=false;
  var veilEl=document.getElementById('veil')||document.getElementById('loading');
  function reveal(){if(revealed)return;revealed=true;if(veilEl)veilEl.classList.add('hidden');}
  function pump(){
    if(qi>=order.length)return;
    var i=order[qi++], im=new Image();
    im.onload=function(){imgs[i]=im;ok[i]=true;lastDrawn=-1;if(i===0)reveal();pump();};
    im.onerror=function(){ok[i]=false;pump();};
    im.src=frames[i];
  }
  for(var w=0;w<12;w++)pump();
  setTimeout(reveal,3000);
  begin();

  function draw(force){
    var idx=Math.max(0,Math.min(TOTAL-1,Math.round(cur*(TOTAL-1))));
    if(!ok[idx]){
      var dd=1,ff=-1;
      while(dd<TOTAL){
        if(idx-dd>=0&&ok[idx-dd]){ff=idx-dd;break;}
        if(idx+dd<TOTAL&&ok[idx+dd]){ff=idx+dd;break;}
        dd++;
      }
      if(ff<0)return; idx=ff;
    }
    if(!force && idx===lastDrawn) return;
    var im=imgs[idx];
    if(!im||!im.naturalWidth) return;
    var dpr=Math.min(window.devicePixelRatio||1,2);
    var cW=cv.width/dpr, cH=cv.height/dpr;
    if(!cW||!cH) return;
    var vA=im.naturalWidth/im.naturalHeight, cA=cW/cH, dW=cW, dH=cH, oX=0, oY=0;
    if(vA>cA){dW=cH*vA;oX=(cW-dW)/2;} else {dH=cW/vA;oY=(cH-dH)/2;}
    var ctx=cv.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.drawImage(im,oX,oY,dW,dH);
    lastDrawn=idx;
  }

  function resize(){
    var dpr=Math.min(window.devicePixelRatio||1,2);
    var w=bg.clientWidth, h=bg.clientHeight;
    cv.width=w*dpr; cv.height=h*dpr;
    cv.style.width=w+'px'; cv.style.height=h+'px';
    draw(true);
  }
  window.addEventListener('resize',resize);

  window.addEventListener('scroll',function(){
    var st=window.pageYOffset||document.documentElement.scrollTop;
    var max=scroller.scrollHeight-window.innerHeight;
    target=max>0?Math.max(0,Math.min(1,st/max)):0;
  },{passive:true});

  window.addEventListener('mousemove',function(e){
    var x=(e.clientX-innerWidth/2)/(innerWidth/2);
    var y=(e.clientY-innerHeight/2)/(innerHeight/2);
    bg.style.transform='translate3d('+(x*-18)+'px,'+(y*-18)+'px,0)';
  });

  function begin(){
    resize();
    (function tick(){
      cur+=(target-cur)*0.085;
      draw(false);
      prog.style.transform='scaleX('+cur+')';
      requestAnimationFrame(tick);
    })();
  }
})();
</script>
</body>
</html>
