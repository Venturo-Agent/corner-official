              description:{zh:"四分之三建於湖面上、可容納一萬兩千人的普特拉清真寺，一身罕見的玫瑰粉紅倒映湖光，是大馬最上相的打卡地標。（遇朝拜時段恕不開放入內；女性入內需於入口借取罩袍）",en:"Three-quarters afloat on the lake and seating twelve thousand, the rose-pink Putra Mosque is Malaysia's most photographed landmark. (Closed during prayers; robes provided at the entrance.)"} },
            { kind:"sight", image:"images/penang/putrajaya-lake.jpg", title:{zh:"布城湖",en:"Putrajaya Lake"},
              description:{zh:"650 公頃的人工湖座落行政首都心臟地帶，各部會建築環湖而立，調節著整座城市的氣溫與風景。",en:"A 650-hectare lake at the capital's heart, ministries arrayed along its shore."} },
            { kind:"sight", image:"images/penang/pm-office.jpg", title:{zh:"首相署・首相府廣場",en:"Perdana Putra"},
              description:{zh:"綠穹頂的陶土色大樓雄踞山頂、俯瞰布城湖，融合馬來、伊斯蘭與歐洲建築藝術；廣場前 4.2 公里的林蔭大道是布城最氣派的一段路。",en:"The green-domed Perdana Putra crowns the hill over the lake — Malay, Islamic and European lines in one building, a 4.2 km boulevard at its feet."} },
            { kind:"transit", title:{zh:"吉隆坡 17:10 — 桃園 22:00（星宇 JX726）",en:"Kuala Lumpur 17:10 — Taoyuan 22:00 (JX726)"},
              description:{zh:"星宇航空直飛返台，晚間 22:00 抵達桃園，結束五日典藏之旅。",en:"STARLUX direct home, touching down at 22:00 — five days, well kept."} }
          ],
          meals:{ breakfast:{zh:"飯店",en:"Hotel"}, lunch:{zh:"隆盛東坡肉料理",en:"Loong Seng braised pork"}, dinner:{zh:"機上簡餐",en:"In-flight"} },
          accommodation:{zh:"—",en:"—"}
        }
      ],
      price_tiers:[
        { label:{zh:"現金優惠價",en:"Cash price"}, price:"43,000", note:{zh:"／人",en:"/person"} }
      ],
      price_note:{ zh:"報名訂金 NT$ 20,000／人，收取訂金後依國外旅遊定型化契約辦理。刷卡與單人房差請洽角落旅行社服務人員，實際以訂到機位為準。全程購物 2 站（土產店、巧克力專賣店），絕不強迫。",
                   en:"Deposit NT$20,000 per person; the standard outbound travel contract applies upon deposit. For card payment and single supplements, contact Corner Travel. Two shopping stops (specialties & chocolate), never compulsory." },
      pricing:{
        included:[ {zh:"來回機票與燃料稅",en:"Round-trip flights & fuel tax"}, {zh:"行程內餐食、景點、住宿",en:"Meals, entries & hotels as listed"},
                   {zh:"500 萬責任險＋20 萬意外醫療險",en:"Liability & medical insurance"}, {zh:"領隊、導遊小費",en:"Tour leader & guide tips"} ],
        excluded:[ {zh:"台灣境內機場往返接送",en:"Domestic airport transfers in Taiwan"}, {zh:"新辦護照／台胞證或簽證費用",en:"Passport / visa fees"},
                   {zh:"個人消費衍生之費用",en:"Personal expenses"} ]
      }
    };

    /* ---------- 圖示（emoji→單一線寬 SVG，禁 emoji 鐵律 #2）---------- */
    const KIND_ICON = {
      sight:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>',
      meal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v6a3 3 0 0 0 3 3m0 0a3 3 0 0 0 3-3V3M6 12v9M21 3l-2 6.5A2.5 2.5 0 0 0 21 12v9"/></svg>',
      exp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.5a.56.56 0 0 1 1.04 0l2.12 4.92 5.34.46c.5.04.7.66.32.99l-4.05 3.5 1.21 5.22c.11.49-.42.87-.85.61L12 17.02l-4.61 2.68c-.43.26-.96-.12-.85-.61l1.21-5.22-4.05-3.5a.56.56 0 0 1 .32-.99l5.34-.46L11.48 3.5Z"/></svg>',
      view:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15l5.16-5.16a2.25 2.25 0 0 1 3.18 0l5.16 5.16m-1.5-1.5 1.16-1.16a2.25 2.25 0 0 1 3.18 0l2.16 2.16M3.75 4.5h16.5a1.5 1.5 0 0 1 1.5 1.5v12a1.5 1.5 0 0 1-1.5 1.5H3.75a1.5 1.5 0 0 1-1.5-1.5V6a1.5 1.5 0 0 1 1.5-1.5Z"/></svg>',
      transit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 4.5h6M5.25 9h13.5M7.5 18a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm9 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3ZM6 18h12a1.5 1.5 0 0 0 1.5-1.5V6A1.5 1.5 0 0 0 18 4.5H6A1.5 1.5 0 0 0 4.5 6v10.5A1.5 1.5 0 0 0 6 18Zm0 0v1.5m12-1.5v1.5"/></svg>',
      free:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'
    };
    const KIND_KEY = { sight:'tour.kind.sight', meal:'tour.kind.meal', exp:'tour.kind.exp',
                       view:'tour.kind.view', transit:'tour.kind.transit', free:'tour.kind.free' };
    const STAY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5M3.75 21V6.75A1.5 1.5 0 0 1 5.25 5.25h13.5a1.5 1.5 0 0 1 1.5 1.5V21M7.5 9h.75m-.75 3h.75m3-3h.75m-.75 3h.75m3-3h.75m-.75 3h.75M9.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21"/></svg>';
    const MEAL_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v6a3 3 0 0 0 3 3m0 0a3 3 0 0 0 3-3V3M6 12v9M21 3l-2 6.5A2.5 2.5 0 0 0 21 12v9"/></svg>';

    /* ---------- Renderer：吃 ITINERARY 生頁面（語言切換時重跑）---------- */
    function render() {
      const lang = Corner.getLang();
      const L = (o) => (o == null ? "" : (typeof o === "string" ? o : (o[lang] || o.zh || "")));
      const t = (k) => Corner.t(k);
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
      const D = ITINERARY;

      // hero
      document.getElementById("crumb-here").textContent = L(D.title);
      document.title = L(D.title) + " · corner travel";
      document.getElementById("hero-eyebrow").textContent =
        L(D.country) + " · " + D.days_count + " " + t("common.days");
      document.getElementById("hero-title").textContent = L(D.title);
      document.getElementById("hero-sub").textContent = L(D.subtitle);
      document.getElementById("hero-cover").innerHTML =
        '<img src="' + D.cover_image + '" alt="' + esc(L(D.title)) + '" loading="lazy" />';

      // overview
      document.getElementById("overview-intro").textContent = L(D.intro);
      document.getElementById("overview-facts").innerHTML = D.facts.map((f) =>
        '<div class="itin-fact"><div class="k">' + esc(L(f.k)) + '</div><div class="v">' + esc(L(f.v)) + "</div></div>"
      ).join("");

      // days（章節式：超大編號＋錯位標題、主角大圖左右交錯、次要點雙欄細列）
      const kindHTML = (a) => '<span class="stop-kind">' +
        (KIND_ICON[a.kind] || KIND_ICON.sight) + t(KIND_KEY[a.kind] || "tour.kind.sight") + "</span>";

      document.getElementById("days").innerHTML = D.daily_itinerary.map((day, i) => {
        const acts = day.activities || [];
        let li = acts.findIndex((a) => a.lead && a.image);
        if (li < 0) li = acts.findIndex((a) => a.image);
        const lead = li >= 0 ? acts[li] : null;
        const others = acts.filter((_, idx) => idx !== li);

        const feature = lead
          ? '<div class="feature' + (i % 2 ? " rev" : "") + '" data-reveal>' +
              '<div class="feature-media"><img src="' + lead.image + '" alt="' + esc(L(lead.title)) + '" loading="lazy" /></div>' +
              '<div class="feature-body">' + kindHTML(lead) +
                "<h4>" + esc(L(lead.title)) + "</h4>" +
                (lead.description ? '<p class="stop-desc">' + esc(L(lead.description)) + "</p>" : "") +
              "</div>" +
            "</div>"
          : "";

        const substops = others.length
          ? '<div class="substops" data-reveal>' + others.map((a) =>
              '<div class="substop' + (a.image ? "" : " no-img") + '">' +
                (a.image ? '<div class="substop-media"><img src="' + a.image + '" alt="' + esc(L(a.title)) + '" loading="lazy" /></div>' : "") +
                kindHTML(a) +
                "<h5>" + esc(L(a.title)) + "</h5>" +
                (a.description ? '<p class="stop-desc">' + esc(L(a.description)) + "</p>" : "") +
              "</div>"
            ).join("") + "</div>"
          : "";

        const m = day.meals || {};
        const mealParts = [["breakfast","tour.b"],["lunch","tour.l"],["dinner","tour.d"]]
          .filter(([k]) => m[k] && L(m[k]) && L(m[k]) !== "—")
          .map(([k, lk]) => '<span class="it"><b>' + t(lk) + "</b> " + esc(L(m[k])) + "</span>").join("");
        const mealStrip = mealParts
          ? '<div class="day-eat"><span class="lbl">' + MEAL_ICON + t("tour.meals") + "</span>" + mealParts + "</div>"
          : "";

        const stayName = L(day.accommodation);
        const stayStrip = (stayName && stayName !== "—")
          ? '<div class="day-stay"><span class="lbl">' + STAY_ICON + t("tour.stay") + '</span><span class="nm">' +
              esc(stayName) + "</span>" +
              (day.accommodationRating ? '<span class="rate">' + "★".repeat(day.accommodationRating) + "</span>" : "") +
              (day.isSameAccommodation ? '<span class="it text-muted">· ' + (lang==="en"?"same as prev night":"續住") + "</span>" : "") +
            "</div>"
          : "";

        return (
          '<div class="day-chapter">' +
            '<div class="day-head2" data-reveal>' +
              '<div class="day-num-xl">' + String(i + 1).padStart(2, "0") +
                '<span class="dd">' + esc(L(day.date)) + "</span></div>" +
              '<div class="dh-title">' +
                "<h3>" + esc(L(day.title)) + "</h3>" +
                (day.highlight ? '<p class="hl">' + esc(L(day.highlight)) + "</p>" : "") +
              "</div>" +
            "</div>" +
            feature + substops + mealStrip + stayStrip +
          "</div>"
        );
      }).join("");

      // price
      document.getElementById("price-rows").innerHTML = D.price_tiers.map((p) =>
        '<div class="price-row"><span class="cls">' + esc(L(p.label)) +
        '</span><span class="amt">NT$ ' + p.price + "<small>" + esc(L(p.note)) + "</small></span></div>"
      ).join("");
      document.getElementById("price-note").textContent = L(D.price_note);
      document.getElementById("price-detail").innerHTML =
        '<div class="eyebrow" style="color:rgba(255,255,255,.7)">' + t("tour.incl") + "</div>" +
        '<ul style="margin-top:16px;color:rgba(255,255,255,.85);line-height:2;font-size:14px">' +
          D.pricing.included.map((x) => "<li>· " + esc(L(x)) + "</li>").join("") + "</ul>" +
        '<div class="eyebrow mt-6" style="color:rgba(255,255,255,.7)">' + t("tour.excl") + "</div>" +
        '<ul style="margin-top:16px;color:rgba(255,255,255,.6);line-height:2;font-size:14px">' +
          D.pricing.excluded.map((x) => "<li>· " + esc(L(x)) + "</li>").join("") + "</ul>";

      // 語言切換後新生成的 [data-reveal] 重新接上觀察
      if (window.Corner && Corner._observeReveals) Corner._observeReveals();
    }

    Corner.onChange(render);   // 語言切換時重畫
    render();                  // 首次（site.js 隨後會掃 data-reveal）
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
